<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenSpotify - Region Select</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-light: #2CB67D;
      --green-dark: #7F5AF0;
      --glass-bg: rgba(255, 255, 255, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top left, #121212, #000000 90%);
      overflow: hidden;
      color: #fff;
    }

    .glass-card {
      backdrop-filter: blur(15px);
      background: var(--glass-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      max-width: 420px;
      width: 90%;
      transition: all 0.3s ease;
      animation: fadeIn 1s ease-out;
    }

    h1 {
      font-size: 2.6em;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(90deg, var(--green-dark), var(--green-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 1.15em;
      color: #ccc;
      margin-bottom: 40px;
    }

    .region-button {
      display: block;
      width: 100%;
      padding: 16px;
      margin: 16px 0;
      background: linear-gradient(135deg, var(--green-dark), var(--green-light));
      color: white;
      font-size: 1.1em;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(127, 90, 240, 0.25);
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .region-button::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #2CB67D, #7F5AF0);
      z-index: 0;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .region-button:hover::before {
      opacity: 1;
    }

    .region-button span {
      position: relative;
      z-index: 2;
    }

    .region-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(127, 90, 240, 0.4);
    }

    .region-button:active {
      transform: translateY(0);
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 500px) {
      .glass-card {
        padding: 40px 24px;
      }

      h1 {
        font-size: 2em;
      }

      .region-button {
        font-size: 1em;
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <h1>DoubleDouble</h1>
    <p class="subtitle">Select region to continue</p>
    <button class="region-button" onclick="redirectToUSA()"><span>🇺🇸 USA Region</span></button>
    <button class="region-button" onclick="redirectToEurope()"><span>🇪🇺 Europe Region</span></button>
  </div>

  <script>
    function redirectToUSA() {
      window.location.href = 'https://us.doubledouble.top';
    }

    function redirectToEurope() {
      window.location.href = 'https://eu.doubledouble.top';
    }
  </script>


</body></html>
